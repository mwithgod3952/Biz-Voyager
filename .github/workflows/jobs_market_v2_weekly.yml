name: jobs_market_v2_weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 0"

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure .env
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          python jobs_market_v2/scripts/github_actions_runtime.py configure-env \
            --env-path jobs_market_v2/.env
      - name: 환경 설치
        run: ./jobs_market_v2/scripts/setup_env.sh
      - name: 주간 수집 실행
        run: |
          set -euo pipefail
          cd jobs_market_v2
          ./.venv/bin/python -m jobs_market_v2.cli discover-companies
          ./.venv/bin/python -m jobs_market_v2.cli discover-sources
          ./.venv/bin/python -m jobs_market_v2.cli verify-sources
          ./.venv/bin/python -m jobs_market_v2.cli collect-jobs
          ./.venv/bin/python -m jobs_market_v2.cli build-coverage-report
          ./.venv/bin/python -m jobs_market_v2.cli promote-staging
          ./.venv/bin/python -m jobs_market_v2.cli sync-sheets --target staging
