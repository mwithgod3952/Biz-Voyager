name: apply_preserve_master_promotion_20260412202121

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/patches/preserve_master_promotion_20260412202121.patch"
      - ".github/workflows/apply_preserve_master_promotion_20260412202121.yml"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply preservation patch
        run: |
          set -euo pipefail
          git apply --check .github/patches/preserve_master_promotion_20260412202121.patch
          git apply .github/patches/preserve_master_promotion_20260412202121.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install environment
        run: ./jobs_market_v2/scripts/setup_env.sh

      - name: Validate preservation tests
        run: |
          set -euo pipefail
          cd jobs_market_v2
          ./.venv/bin/python -m pytest \
            tests/test_jobs_market_v2.py::test_promote_staging_blocks_suspicious_partial_scan_shrink \
            tests/test_jobs_market_v2.py::test_promote_staging_preserves_master_rows_after_full_scan_shrink \
            -q

      - name: Commit source update
        run: |
          set -euo pipefail
          rm -f .github/patches/preserve_master_promotion_20260412202121.patch
          rm -f .github/workflows/apply_preserve_master_promotion_20260412202121.yml
          git add jobs_market_v2/src/jobs_market_v2/pipelines.py jobs_market_v2/tests/test_jobs_market_v2.py .github/patches .github/workflows
          git commit -m "Preserve master rows during promotion"
          git push origin HEAD:main
