name: jobs_market_v2_daily

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/jobs_market_v2_daily.yml"
      - "jobs_market_v2/**"
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: jobs-market-v2-production
  cancel-in-progress: false

env:
  PROJECT_DIR: jobs_market_v2
  STATE_BRANCH: automation-state
  STATE_DIR: jobs_market_v2/.ci_state

jobs:
  run-production-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare state branch worktree
        run: |
          set -euo pipefail
          STATE_WORKTREE="${RUNNER_TEMP}/jobs-market-v2-state"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf "$STATE_WORKTREE"
          if git ls-remote --exit-code origin "refs/heads/$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH:$STATE_BRANCH"
            git worktree add "$STATE_WORKTREE" "$STATE_BRANCH"
          else
            git worktree add -b "$STATE_BRANCH" "$STATE_WORKTREE" HEAD
            pushd "$STATE_WORKTREE" >/dev/null
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            mkdir -p "$STATE_DIR"
            printf '%s\n' '{"consecutive_failures": 0, "last_result": "bootstrap"}' > "$STATE_DIR/workflow_state.json"
            git add -A
            git commit -m "Initialize automation state branch"
            git push origin "HEAD:$STATE_BRANCH"
            popd >/dev/null
          fi

      - name: Restore runtime state
        run: |
          set -euo pipefail
          STATE_WORKTREE="${RUNNER_TEMP}/jobs-market-v2-state"
          mkdir -p "$PROJECT_DIR/runtime"
          BUNDLE_PATH="$STATE_WORKTREE/$STATE_DIR/runtime_state.tar.gz"
          if [[ -f "$BUNDLE_PATH" ]]; then
            python "$PROJECT_DIR/scripts/runtime_state_bundle.py" extract \
              --project-root "$PROJECT_DIR" \
              --bundle-path "$BUNDLE_PATH"
          fi
          STATE_JSON="$STATE_WORKTREE/$STATE_DIR/workflow_state.json"
          if [[ -f "$STATE_JSON" ]]; then
            cp "$STATE_JSON" "$PROJECT_DIR/runtime/github_workflow_state.json"
            FAILURE_STREAK="$(python -c 'import json; from pathlib import Path; data = json.loads(Path("jobs_market_v2/runtime/github_workflow_state.json").read_text(encoding="utf-8")); print(int(data.get("consecutive_failures", 0)))')"
          else
            FAILURE_STREAK="0"
          fi
          echo "failure_streak=$FAILURE_STREAK" >> "$GITHUB_ENV"

      - name: Configure .env
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          env_path = Path("jobs_market_v2/.env")
          lines = []
          required = {
              "GOOGLE_SHEETS_SPREADSHEET_ID": os.environ.get("GOOGLE_SHEETS_SPREADSHEET_ID", ""),
              "GOOGLE_SERVICE_ACCOUNT_JSON": os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", ""),
          }
          missing = [name for name, value in required.items() if not value]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")

          optional = {
              "GEMINI_API_KEY": os.environ.get("GEMINI_API_KEY", ""),
          }

          def quote(value: str) -> str:
              return "'" + value.replace("'", "'\"'\"'") + "'"

          for key, value in required.items():
              lines.append(f"{key}={quote(value)}")
          lines.append("JOBS_MARKET_V2_USE_MOCK_SOURCES=false")
          lines.append("JOBS_MARKET_V2_ENABLE_FALLBACK_SOURCE_GUESS=false")
          lines.append("JOBS_MARKET_V2_ENABLE_GEMINI_FALLBACK=true")
          lines.append("JOBS_MARKET_V2_GEMINI_MAX_CALLS_PER_RUN=24")
          lines.append("JOBS_MARKET_V2_JOB_COLLECTION_MAX_RUNTIME_SECONDS=1800")
          for key, value in optional.items():
              if value:
                  lines.append(f"{key}={quote(value)}")
          env_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Install environment
        run: ./jobs_market_v2/scripts/setup_env.sh

      - name: Run production cycle
        id: cycle
        run: |
          set +e
          cd "$PROJECT_DIR"
          SUMMARY_PATH="$PWD/runtime/github_workflow_cycle_summary.json"
          STATUS_PATH="$PWD/runtime/github_workflow_cycle_status.json"
          ./.venv/bin/python -m jobs_market_v2.cli run-collection-cycle | tee "$SUMMARY_PATH"
          EXIT_CODE=${PIPESTATUS[0]}
          STATUS_PATH="$STATUS_PATH" SUMMARY_PATH="$SUMMARY_PATH" EXIT_CODE="$EXIT_CODE" python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["SUMMARY_PATH"])
          status_path = Path(os.environ["STATUS_PATH"])
          exit_code = str(os.environ.get("EXIT_CODE", "1") or "1")
          summary = {}
          if summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  summary = {}
          run_mode = str(summary.get("run_mode", "") or "")
          published_state = summary.get("published_state", {}) if isinstance(summary, dict) else {}
          collection_summary = summary.get("collection", {}) if isinstance(summary, dict) else {}
          promotion_block_reason = str(published_state.get("promotion_block_reason", "") or "")
          collection_ready = bool(published_state.get("collection_ready", True))
          collection_ready_reason = str(published_state.get("collection_ready_reason", "") or "")
          completed_full_source_scan = bool(collection_summary.get("completed_full_source_scan", True))
          quality_gate_passed = bool(collection_summary.get("quality_gate_passed", True))
          hold_reason = ""
          if run_mode in {"bootstrap", "bootstrap_resume"}:
              if not collection_ready:
                  hold_reason = collection_ready_reason or "bootstrap_collection_not_ready"
              elif promotion_block_reason == "bootstrap_source_scan_incomplete":
                  hold_reason = promotion_block_reason
              elif not completed_full_source_scan:
                  hold_reason = "bootstrap_source_scan_incomplete"
          status = {
              "exit_code": exit_code,
              "quality_gate_passed": quality_gate_passed,
              "hold_reason": hold_reason,
              "promotion_block_reason": promotion_block_reason,
              "automation_ready": bool(summary.get("automation_ready", False)),
          }
          status_path.write_text(json.dumps(status, ensure_ascii=False, indent=2), encoding="utf-8")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"exit_code={exit_code}\n")
              output.write(f"quality_gate_passed={str(quality_gate_passed).lower()}\n")
              output.write(f"hold_reason={hold_reason}\n")
          PY
          exit 0

      - name: Resolve cycle status
        if: always()
        id: cycle_status
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          project_dir = Path("jobs_market_v2")
          quality_gate_path = project_dir / "runtime/quality_gate.json"
          summary_path = project_dir / "runtime/github_workflow_cycle_summary.json"
          status_path = project_dir / "runtime/github_workflow_cycle_status.json"

          exit_code = "1"
          quality_gate_passed_text = "false"
          hold_reason = ""

          if status_path.exists():
              try:
                  status = json.loads(status_path.read_text(encoding="utf-8"))
              except Exception:
                  status = {}
              exit_code = str(status.get("exit_code", "1") or "1").strip() or "1"
              quality_gate_passed_text = "true" if bool(status.get("quality_gate_passed", False)) else "false"
              hold_reason = str(status.get("hold_reason", "") or "").strip()

          if quality_gate_passed_text not in {"true", "false"} and quality_gate_path.exists():
              try:
                  quality_gate_passed = bool(json.loads(quality_gate_path.read_text(encoding="utf-8")).get("passed", False))
              except Exception:
                  quality_gate_passed = False
              quality_gate_passed_text = "true" if quality_gate_passed else "false"

          if not hold_reason and summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text(encoding="utf-8"))
              except Exception:
                  summary = {}
              run_mode = str(summary.get("run_mode", "") or "")
              published_state = summary.get("published_state", {}) if isinstance(summary, dict) else {}
              collection_summary = summary.get("collection", {}) if isinstance(summary, dict) else {}
              promotion_block_reason = str(published_state.get("promotion_block_reason", "") or "")
              collection_ready = bool(published_state.get("collection_ready", True))
              collection_ready_reason = str(published_state.get("collection_ready_reason", "") or "")
              completed_full_source_scan = bool(collection_summary.get("completed_full_source_scan", True))
              if run_mode in {"bootstrap", "bootstrap_resume"}:
                  if not collection_ready:
                      hold_reason = collection_ready_reason or "bootstrap_collection_not_ready"
                  elif promotion_block_reason == "bootstrap_source_scan_incomplete":
                      hold_reason = promotion_block_reason
                  elif not completed_full_source_scan:
                      hold_reason = "bootstrap_source_scan_incomplete"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"exit_code={exit_code}\n")
              output.write(f"quality_gate_passed={quality_gate_passed_text}\n")
              output.write(f"hold_reason={hold_reason}\n")
          PY

      - name: Save runtime state after success or bootstrap hold
        if: always() && (steps.cycle_status.outputs.exit_code == '0' || steps.cycle_status.outputs.hold_reason != '')
        env:
          CYCLE_EXIT_CODE: ${{ steps.cycle_status.outputs.exit_code }}
          CYCLE_HOLD_REASON: ${{ steps.cycle_status.outputs.hold_reason }}
          CYCLE_QUALITY_GATE_PASSED: ${{ steps.cycle_status.outputs.quality_gate_passed }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATE_WORKTREE: ${{ runner.temp }}/jobs-market-v2-state
        run: |
          set -euo pipefail
          BUNDLE_PATH="$STATE_WORKTREE/$STATE_DIR/runtime_state.tar.gz"
          python "$PROJECT_DIR/scripts/runtime_state_bundle.py" create \
            --project-root "$PROJECT_DIR" \
            --bundle-path "$BUNDLE_PATH" \
            --manifest-path "$PROJECT_DIR/config/runtime_state_manifest.txt"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          state_path = Path(os.environ["STATE_WORKTREE"]) / os.environ["STATE_DIR"] / "workflow_state.json"
          runtime_status_path = Path("jobs_market_v2/runtime/automation_status.json")
          state_path.parent.mkdir(parents=True, exist_ok=True)
          hold_reason = os.environ.get("CYCLE_HOLD_REASON", "")
          quality_gate_passed = os.environ.get("CYCLE_QUALITY_GATE_PASSED", "true") == "true"
          if hold_reason:
              last_result = "hold"
          elif quality_gate_passed:
              last_result = "success"
          else:
              last_result = "failure"
          payload = {
              "updated_at": datetime.now(timezone.utc).isoformat(),
              "consecutive_failures": 0 if quality_gate_passed or hold_reason else 1,
              "last_result": last_result,
              "hold_reason": hold_reason,
              "run_url": os.environ["GITHUB_RUN_URL"],
          }
          if runtime_status_path.exists():
              payload["automation_status"] = json.loads(runtime_status_path.read_text(encoding="utf-8"))
          state_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          PY
          pushd "$STATE_WORKTREE" >/dev/null
          git add "$STATE_DIR"
          if ! git diff --cached --quiet; then
            git commit -m "Update automation state for run $GITHUB_RUN_ID"
            git push origin "HEAD:$STATE_BRANCH"
          fi
          popd >/dev/null

      - name: Close GitHub issue after recovery
        if: steps.cycle_status.outputs.exit_code == '0' && steps.cycle_status.outputs.quality_gate_passed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          title = "[Automation] jobs_market_v2 production failures"

          def request(method: str, url: str, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  method=method,
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return json.loads(resp.read().decode("utf-8")) if resp.length != 0 else None

          issues = request(
              "GET",
              f"{api_url}/repos/{repo}/issues?state=open&labels={urllib.parse.quote('automation,incident', safe='')}&per_page=100",
          )
          for issue in issues:
              if issue.get("title") != title:
                  continue
              issue_number = issue["number"]
              request(
                  "POST",
                  f"{api_url}/repos/{repo}/issues/{issue_number}/comments",
                  {"body": "A later scheduled run succeeded. Closing this automation incident automatically."},
              )
              request(
                  "PATCH",
                  f"{api_url}/repos/{repo}/issues/{issue_number}",
                  {"state": "closed"},
              )
          PY

      - name: Update failure state
        if: steps.cycle_status.outputs.hold_reason == '' && (steps.cycle_status.outputs.exit_code != '0' || steps.cycle_status.outputs.quality_gate_passed != 'true')
        id: failure_state
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATE_WORKTREE: ${{ runner.temp }}/jobs-market-v2-state
        run: |
          set -euo pipefail
          BUNDLE_PATH="$STATE_WORKTREE/$STATE_DIR/runtime_state.tar.gz"
          python "$PROJECT_DIR/scripts/runtime_state_bundle.py" create \
            --project-root "$PROJECT_DIR" \
            --bundle-path "$BUNDLE_PATH" \
            --manifest-path "$PROJECT_DIR/config/runtime_state_manifest.txt"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          state_path = Path(os.environ["STATE_WORKTREE"]) / os.environ["STATE_DIR"] / "workflow_state.json"
          state_path.parent.mkdir(parents=True, exist_ok=True)
          if state_path.exists():
              payload = json.loads(state_path.read_text(encoding="utf-8"))
          else:
              payload = {}
          payload["updated_at"] = datetime.now(timezone.utc).isoformat()
          payload["consecutive_failures"] = int(payload.get("consecutive_failures", 0)) + 1
          payload["last_result"] = "failure"
          payload["hold_reason"] = ""
          payload["run_url"] = os.environ["GITHUB_RUN_URL"]
          state_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(payload["consecutive_failures"])
          PY
          FAILURE_STREAK="$(python -c 'import json, os; from pathlib import Path; state_path = Path(os.environ["STATE_WORKTREE"]) / os.environ["STATE_DIR"] / "workflow_state.json"; payload = json.loads(state_path.read_text(encoding="utf-8")); print(int(payload.get("consecutive_failures", 0)))')"
          echo "failure_streak=$FAILURE_STREAK" >> "$GITHUB_OUTPUT"
          pushd "$STATE_WORKTREE" >/dev/null
          git add "$STATE_DIR"
          if ! git diff --cached --quiet; then
            git commit -m "Record automation failure for run $GITHUB_RUN_ID"
            git push origin "HEAD:$STATE_BRANCH"
          fi
          popd >/dev/null

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-market-v2-runtime-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            jobs_market_v2/runtime/automation_status.json
            jobs_market_v2/runtime/quality_gate.json
            jobs_market_v2/runtime/errors.csv
            jobs_market_v2/runtime/runs.csv
            jobs_market_v2/runtime/master_jobs.csv
            jobs_market_v2/runtime/staging_jobs.csv
            jobs_market_v2/runtime/source_registry.csv

      - name: Notify Slack on repeated failures
        if: steps.cycle_status.outputs.hold_reason == '' && (steps.cycle_status.outputs.exit_code != '0' || steps.cycle_status.outputs.quality_gate_passed != 'true') && fromJSON(steps.failure_state.outputs.failure_streak) >= 3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILURE_STREAK: ${{ steps.failure_state.outputs.failure_streak }}
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "text": (
                  f"jobs_market_v2 production cycle failed {os.environ['FAILURE_STREAK']} times in a row.\n"
                  f"Run: {os.environ['GITHUB_RUN_URL']}"
              )
          }
          request = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=15) as response:
              if response.status >= 300:
                  raise SystemExit(f"Slack webhook failed with status {response.status}")
          PY

      - name: Create or update GitHub issue on failure
        if: steps.cycle_status.outputs.hold_reason == '' && (steps.cycle_status.outputs.exit_code != '0' || steps.cycle_status.outputs.quality_gate_passed != 'true')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILURE_STREAK: ${{ steps.failure_state.outputs.failure_streak }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = os.environ["GITHUB_RUN_URL"]
          failure_streak = os.environ["FAILURE_STREAK"]
          title = "[Automation] jobs_market_v2 production failures"
          labels = ["automation", "incident"]
          body = (
              "jobs_market_v2 production cycle is repeatedly failing.\n\n"
              f"- Consecutive failures: {failure_streak}\n"
              f"- Latest run: {run_url}\n"
          )

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  method=method,
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return json.loads(resp.read().decode("utf-8")) if resp.length != 0 else None

          encoded_title = urllib.parse.quote(title, safe="")
          issues = request(
              "GET",
              f"{api_url}/repos/{repo}/issues?state=open&labels={urllib.parse.quote(','.join(labels), safe='')}&per_page=100",
          )
          existing = None
          for issue in issues:
              if issue.get("title") == title:
                  existing = issue
                  break

          if existing is None:
              issue = request(
                  "POST",
                  f"{api_url}/repos/{repo}/issues",
                  {"title": title, "body": body, "labels": labels},
              )
              issue_number = issue["number"]
          else:
              issue_number = existing["number"]
              request(
                  "PATCH",
                  f"{api_url}/repos/{repo}/issues/{issue_number}",
                  {"body": body},
              )

          request(
              "POST",
              f"{api_url}/repos/{repo}/issues/{issue_number}/comments",
              {"body": f"Repeated failure detected again.\n\n- Latest run: {run_url}\n- Consecutive failures: {failure_streak}"},
          )
          PY

      - name: Fail workflow if production cycle failed
        if: steps.cycle_status.outputs.hold_reason == '' && (steps.cycle_status.outputs.exit_code != '0' || steps.cycle_status.outputs.quality_gate_passed != 'true')
        run: exit 1
