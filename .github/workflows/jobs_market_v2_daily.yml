name: jobs_market_v2_daily

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/jobs_market_v2_daily.yml"
      - "jobs_market_v2/**"
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: jobs-market-v2-production
  cancel-in-progress: false

env:
  PROJECT_DIR: jobs_market_v2
  STATE_BRANCH: automation-state
  STATE_DIR: jobs_market_v2/.ci_state

jobs:
  run-production-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare state branch worktree
        run: |
          set -euo pipefail
          STATE_WORKTREE="${RUNNER_TEMP}/jobs-market-v2-state"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf "$STATE_WORKTREE"
          if git ls-remote --exit-code origin "refs/heads/$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH:$STATE_BRANCH"
            git worktree add "$STATE_WORKTREE" "$STATE_BRANCH"
          else
            git worktree add -b "$STATE_BRANCH" "$STATE_WORKTREE" HEAD
            pushd "$STATE_WORKTREE" >/dev/null
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            mkdir -p "$STATE_DIR"
            printf '%s\n' '{"consecutive_failures": 0, "last_result": "bootstrap"}' > "$STATE_DIR/workflow_state.json"
            git add -A
            git commit -m "Initialize automation state branch"
            git push origin "HEAD:$STATE_BRANCH"
            popd >/dev/null
          fi

      - name: Restore runtime state
        run: |
          set -euo pipefail
          STATE_WORKTREE="${RUNNER_TEMP}/jobs-market-v2-state"
          mkdir -p "$PROJECT_DIR/runtime"
          BUNDLE_PATH="$STATE_WORKTREE/$STATE_DIR/runtime_state.tar.gz"
          if [[ -f "$BUNDLE_PATH" ]]; then
            python "$PROJECT_DIR/scripts/runtime_state_bundle.py" extract \
              --project-root "$PROJECT_DIR" \
              --bundle-path "$BUNDLE_PATH"
          fi
          STATE_JSON="$STATE_WORKTREE/$STATE_DIR/workflow_state.json"
          if [[ -f "$STATE_JSON" ]]; then
            cp "$STATE_JSON" "$PROJECT_DIR/runtime/github_workflow_state.json"
            FAILURE_STREAK="$(python -c 'import json; from pathlib import Path; data = json.loads(Path("jobs_market_v2/runtime/github_workflow_state.json").read_text(encoding="utf-8")); print(int(data.get("consecutive_failures", 0)))')"
          else
            FAILURE_STREAK="0"
          fi
          echo "failure_streak=$FAILURE_STREAK" >> "$GITHUB_ENV"

      - name: Configure .env
        env:
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          python "$PROJECT_DIR/scripts/github_actions_runtime.py" configure-env \
            --env-path "$PROJECT_DIR/.env"

      - name: Install environment
        run: ./jobs_market_v2/scripts/setup_env.sh

      - name: Run production cycle
        id: cycle
        run: |
          set +e
          cd "$PROJECT_DIR"
          SUMMARY_PATH="$PWD/runtime/github_workflow_cycle_summary.json"
          STATUS_PATH="$PWD/runtime/github_workflow_cycle_status.json"
          ./.venv/bin/python -m jobs_market_v2.cli run-collection-cycle | tee "$SUMMARY_PATH"
          EXIT_CODE=${PIPESTATUS[0]}
          ./.venv/bin/python scripts/github_actions_runtime.py capture-cycle-status \
            --project-root "$PWD" \
            --summary-path "$SUMMARY_PATH" \
            --status-path "$STATUS_PATH" \
            --exit-code "$EXIT_CODE"
          exit 0

      - name: Finalize workflow state and incident handling
        if: always()
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATE_WORKTREE: ${{ runner.temp }}/jobs-market-v2-state
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          BUNDLE_PATH="$STATE_WORKTREE/$STATE_DIR/runtime_state.tar.gz"
          RESULT_PATH="$PROJECT_DIR/runtime/github_workflow_finalize_result.json"
          python "$PROJECT_DIR/scripts/runtime_state_bundle.py" create \
            --project-root "$PROJECT_DIR" \
            --bundle-path "$BUNDLE_PATH" \
            --manifest-path "$PROJECT_DIR/config/runtime_state_manifest.txt"
          python "$PROJECT_DIR/scripts/github_actions_runtime.py" finalize-cycle \
            --project-root "$PROJECT_DIR" \
            --status-path "$PROJECT_DIR/runtime/github_workflow_cycle_status.json" \
            --state-path "$STATE_WORKTREE/$STATE_DIR/workflow_state.json" \
            --run-url "$GITHUB_RUN_URL" \
            --api-url "$GITHUB_API_URL" \
            --repo "$REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --slack-webhook-url "${SLACK_WEBHOOK_URL:-}" \
            --result-path "$RESULT_PATH"
          pushd "$STATE_WORKTREE" >/dev/null
          git add "$STATE_DIR"
          if ! git diff --cached --quiet; then
            git commit -m "Update automation state for run $GITHUB_RUN_ID"
            git push origin "HEAD:$STATE_BRANCH"
          fi
          popd >/dev/null
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          result_path = Path("jobs_market_v2/runtime/github_workflow_finalize_result.json")
          result = json.loads(result_path.read_text(encoding="utf-8"))
          sys.exit(1 if result.get("is_failure") else 0)
          PY

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-market-v2-runtime-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            jobs_market_v2/runtime/automation_status.json
            jobs_market_v2/runtime/quality_gate.json
            jobs_market_v2/runtime/errors.csv
            jobs_market_v2/runtime/runs.csv
            jobs_market_v2/runtime/master_jobs.csv
            jobs_market_v2/runtime/staging_jobs.csv
            jobs_market_v2/runtime/source_registry.csv
            jobs_market_v2/runtime/github_workflow_cycle_summary.json
            jobs_market_v2/runtime/github_workflow_cycle_status.json
            jobs_market_v2/runtime/github_workflow_finalize_result.json
